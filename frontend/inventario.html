<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Inventario - Acueducto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📦 Control de Inventario</h1>

    <form id="formProducto">
        <div class="campo">
            <label>Código del Producto:</label>
            <input type="text" id="codigo" placeholder="PROD-001" required>
        </div>

        <div class="campo">
            <label>Nombre del Artículo:</label>
            <input type="text" id="nombre" required>
        </div>

        <div class="campo">
            <label>Cantidad en Stock:</label>
            <input type="number" id="cantidad" required>
        </div>

        <div class="campo">
            <label>Unidad de Medida:</label>
            <select id="unidad">
                <option value="Unidad">Unidad</option>
                <option value="Metro">Metro</option>
                <option value="Kilo">Kilo</option>
                <option value="Caja">Caja</option>
            </select>
        </div>

        <div class="campo">
            <label>Ubicación en Almacén:</label>
            <input type="text" id="ubicacion" placeholder="Estante A - Nivel 2">
        </div>

        <button type="submit" class="btn">Guardar Producto</button>
    </form>

    <div id="mensajeExito" style="display:none; color: green; margin-top: 20px; font-weight: bold;">
        ✅ Producto guardado correctamente
    </div>
</div>

<script src="inventario.js"></script>
</body>
</html>
