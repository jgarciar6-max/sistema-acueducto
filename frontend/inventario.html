<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control y Registro de Materiales</title> <!-- Cambiado el título para mayor claridad -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="contenedor-principal">
        <h1>📦 GESTIÓN DE MATERIALES</h1> <!-- Cambiado el título principal -->

        <div class="buscador">
            <input type="text" id="buscadorInput" 
                   placeholder="🔎 Buscar material por nombre, ID...">
            <button onclick="buscar()">BUSCAR</button>
        </div>

        <!-- ===== BOTÓN PARA CARGAR MATERIALES DESDE LA BD ===== -->
        <div style="text-align: center; margin-top: 20px; margin-bottom: 20px;">
            <button id="btnCargarMateriales" class="btn-primary">Cargar Materiales</button>
        </div>
        <!-- ==================================================== -->

        <!-- ===== TABLA PARA MOSTRAR LOS MATERIALES ===== -->
        <table class="tabla-inventario">
            <thead>
                <tr>
                    <th>ID Material</th>
                    <th>Nombre</th>
                    <th>Cantidad</th>
                    <th>Unidad</th>
                    <th>Descripción</th>
                    <th>Fecha Registro</th>
                    <th>Registrado Por</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="cuerpoTablaMateriales">
                <!-- Aquí se cargarán los materiales dinámicamente con JavaScript -->
            </tbody>
        </table>

        <button onclick="volver()" class="btn-volver">🔙 VOLVER AL MENÚ</button>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
