<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Entradas y Salidas</title>
    <!-- ✅ RUTA CORREGIDA -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Estilos extra solo para esta página */
        .seccion {
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        .salidas {
            background-color: #28a745; /* VERDE */
        }

        .entradas {
            background-color: #17a2b8; /* AZUL */
        }

        .seccion h2 {
            margin-bottom: 20px;
            font-size: 1.8rem;
            text-transform: uppercase;
        }

        .formulario-dividido {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            flex-wrap: wrap;
        }

        .campo-dividido {
            background-color: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
            min-width: 200px;
        }

        .campo-dividido label {
            display: block;
            margin-bottom: 5px;
        }

        .campo-dividido input,
        .campo-dividido select {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: none;
        }

        .btn-accion {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-salida {
            background-color: #dc3545;
            color: white;
        }

        .btn-entrada {
            background-color: #007bff;
            color: white;
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <h1>REGISTRO DE MOVIMIENTOS</h1>

        <!-- ===== SECCIÓN DE SALIDAS (ENTREGA DE MATERIAL) ===== -->
        <!-- ✅ Añado un ID al formulario de salidas para facilitar la escucha del evento submit -->
        <div class="seccion salidas">
            <h2>🔴 SALIDAS / ENTREGA</h2>
            <!-- ✅ Añado ID a cada input -->
            <div class="formulario-dividido">
                <div class="campo-dividido">
                    <label for="salidaPqr">📄 N° PQR / ORDEN</label>
                    <input type="text" id="salidaPqr" placeholder="Número">
                </div>
                <div class="campo-dividido">
                    <label for="salidaQuienSeLoLleva">👤 QUIEN SE LO LLEVA</label>
                    <input type="text" id="salidaQuienSeLoLleva" placeholder="Nombre">
                </div>
                <div class="campo-dividido">
                    <label for="salidaMaterial">📦 MATERIAL</label>
                    <input type="text" id="salidaMaterial" placeholder="Nombre">
                </div>
                <div class="campo-dividido">
                    <label for="salidaCantidad">📏 CANTIDAD / METROS</label>
                    <input type="number" id="salidaCantidad" placeholder="Cantidad">
                </div>
                <div class="campo-dividido">
                    <label for="salidaObservacion">📝 OBSERVACIÓN</label>
                    <input type="text" id="salidaObservacion" placeholder="Detalle">
                </div>
            </div>
            <!-- ✅ Añado un ID al botón de registrar salida -->
            <button class="btn-accion btn-salida" id="btnRegistrarSalida">REGISTRAR SALIDA</button>
        </div>

        <!-- ===== SECCIÓN DE ENTRADAS (INGRESO DE MATERIAL) ===== -->
        <!-- ✅ Añado un ID al formulario de entradas -->
        <div class="seccion entradas">
            <h2>🟢 ENTRADAS / INGRESO</h2>
            <!-- ✅ Añado ID a cada input -->
            <div class="formulario-dividido">
                <div class="campo-dividido">
                    <label for="entradaFactura">📄 N° FACTURA / ORDEN</label>
                    <input type="text" id="entradaFactura" placeholder="Número">
                </div>
                <div class="campo-dividido">
                    <label for="entradaMaterial">📦 MATERIAL</label>
                    <input type="text" id="entradaMaterial" placeholder="Nombre">
                </div>
                <div class="campo-dividido">
                    <label for="entradaCantidad">📏 CANTIDAD / METROS</label>
                    <input type="number" id="entradaCantidad" placeholder="Cantidad">
                </div>
                <div class="campo-dividido">
                    <label for="entradaObservacion">📝 OBSERVACIÓN</label>
                    <input type="text" id="entradaObservacion" placeholder="Detalle">
                </div>
            </div>
            <!-- ✅ Añado un ID al botón de registrar entrada -->
            <button class="btn-accion btn-entrada" id="btnRegistrarEntrada">REGISTRAR ENTRADA</button>
        </div>

        <!-- El botón "volver" ya tiene onclick="volver()" y la función está en script.js, lo cual está bien. -->
        <button onclick="volver()" class="btn-volver">🔙 VOLVER AL MENÚ</button>
    </div>

    <!-- ✅ Utilizas el mismo script.js. Tendremos que añadir la lógica de este formulario ahí. -->
    <script src="js/script.js"></script>
</body>
</html>
