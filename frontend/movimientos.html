<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Entradas y Salidas</title>
    <!-- ✅ RUTA CORREGIDA -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Estilos extra solo para esta página */
        .seccion {
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        .salidas {
            background-color: #28a745; /* VERDE */
        }

        /* Eliminamos la clase .entradas si ya no hay sección de entradas */
        /* .entradas {
            background-color: #17a2b8;
        } */

        .seccion h2 {
            margin-bottom: 20px;
            font-size: 1.8rem;
            text-transform: uppercase;
        }

        .formulario-dividido {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            flex-wrap: wrap;
        }

        .campo-dividido {
            background-color: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
            min-width: 200px;
        }

        .campo-dividido label {
            display: block;
            margin-bottom: 5px;
        }

        .campo-dividido input,
        .campo-dividido select {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: none;
        }

        .btn-accion {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-salida {
            background-color: #dc3545;
            color: white;
        }

        /* Eliminamos los estilos para btn-entrada si ya no hay botón de entrada */
        /* .btn-entrada {
            background-color: #007bff;
            color: white;
        } */
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <h1>REGISTRO DE MOVIMIENTOS</h1>

        <!-- ===== SECCIÓN DE SALIDAS (ENTREGA DE MATERIAL) ===== -->
        <div class="seccion salidas">
            <h2>🔴 SALIDAS / ENTREGA</h2>
            <div class="formulario-dividido">
                <div class="campo-dividido">
                    <label for="salidaPqr">📄 N° PQR / ORDEN</label>
                    <input type="text" id="salidaPqr" placeholder="Número">
                </div>
                <div class="campo-dividido">
                    <label for="salidaQuienSeLoLleva">👤 QUIEN SE LO LLEVA</label>
                    <input type="text" id="salidaQuienSeLoLleva" placeholder="Nombre">
                </div>
                <div class="campo-dividido">
                    <label for="salidaMaterialNombre">📦 MATERIAL</label>
                    <!-- CAMBIO AQUÍ: input con list y datalist -->
                    <input type="text" id="salidaMaterialNombre" list="materialesDisponibles" placeholder="Selecciona o escribe el material">
                    <datalist id="materialesDisponibles"></datalist>
                    <!-- Campo oculto para guardar el ID del material seleccionado -->
                    <input type="hidden" id="salidaMaterialId">
                </div>
                <div class="campo-dividido">
                    <label for="salidaCantidad">📏 CANTIDAD / METROS</label>
                    <input type="number" id="salidaCantidad" placeholder="Cantidad">
                </div>
                <div class="campo-dividido">
                    <label for="salidaObservacion">📝 OBSERVACIÓN</label>
                    <input type="text" id="salidaObservacion" placeholder="Detalle">
                </div>
            </div>
            <button class="btn-accion btn-salida" id="btnRegistrarSalida">REGISTRAR SALIDA</button>
        </div>

        <!-- La sección de ENTRADAS/INGRESO ha sido eliminada -->

        <!-- El botón "volver" ya tiene onclick="volver()" y la función está en script.js, lo cual está bien. -->
        <button onclick="volver()" class="btn-volver">🔙 VOLVER AL MENÚ</button>
    </div>

    <!-- ✅ Utilizas el mismo script.js. Tendremos que añadir la lógica de este formulario ahí. -->
    <script src="js/script.js"></script>
</body>
</html>
