 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Acueducto</title>
    <!-- ✅ RUTA CORREGIDA -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="contenedor-principal">
        <h1>SISTEMA DE CONTROL ACUEDUCTO</h1>

        <!-- LAS 3 CAJAS DE ARRIBA -->
        <div class="cards-container">
            <div class="card verde">
                <h3>TOTAL PRODUCTOS</h3>
                <p>200</p>
            </div>
            <div class="card amarillo">
                <h3>STOCK BAJO</h3>
                <p>15</p>
            </div>
            <div class="card azul">
                <h3>ÚLTIMOS MOVIMIENTOS</h3>
                <p>19:20</p>
            </div>
        </div>

        <!-- ===== LOS 4 BOTONES ACTUALIZADOS ===== -->
        <div class="botones-container">
            <button onclick="irReportes()">🖨️ IMPRIMIR REPORTE PDF</button>
            <button onclick="irInventario()">📦 🔐 CONTROL Y REGISTRO</button>
            <button onclick="irMovimientos()">📝 REGISTRAR ENTRADAS Y SALIDAS</button>
            <button onclick="irUsuarios()">👤 GESTIÓN DE USUARIOS</button>
        </div>

        <!-- INFORMACIÓN DE ABAJO -->
        <div class="info-container">
            <div class="info-box">
                <h4>ESTADO DE MATERIALES</h4>
                <p>🟢 VERDE = DISPONIBLE</p>
                <p>🟡 AMARILLO = POCO STOCK</p>
                <p>🔴 ROJO = AGOTADO</p>
            </div>
            <div class="info-box">
                <h4>ÚLTIMAS ACCIONES</h4>
                <p>[10:25] Usuario - Movimiento registrado</p>
                <p>[10:20] Usuario - Movimiento registrado</p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
