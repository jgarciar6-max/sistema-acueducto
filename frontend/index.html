<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Acueducto</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="contenedor-principal">

        <h1>SISTEMA DE CONTROL ACUEDUCTO</h1>

        <!-- ========================= -->
        <!-- TARJETAS SUPERIORES -->
        <!-- ========================= -->
        <div class="cards-container">

            <div class="card verde">
                <h3>TOTAL PRODUCTOS</h3>
                <p id="totalProductos">0</p>
            </div>

            <div class="card amarillo">
                <h3>STOCK BAJO</h3>
                <p id="stockBajo">0</p>
            </div>

            <div class="card azul">
                <h3>ÚLTIMOS MOVIMIENTOS</h3>
                <p id="ultimoMovimiento">0</p>
            </div>

        </div>

        <!-- ========================= -->
        <!-- BOTONES -->
        <!-- ========================= -->
        <div class="botones-container">

            <button onclick="irReportes()">
                CONSULTAR SALIDAS
            </button>

            <button onclick="irInventario()">
                GESTION DE MATERIALES
            </button>

            <button onclick="irMovimientos()">
                REGISTRAR ENTRADAS Y SALIDAS
            </button>

            <button onclick="irUsuarios()">
                👤 GESTIÓN DE USUARIOS
            </button>

        </div>

        <!-- ========================= -->
        <!-- INFORMACIÓN INFERIOR -->
        <!-- ========================= -->
        <div class="info-container">

            <!-- ESTADO -->
            <div class="info-box">

                <h4>ESTADO DE MATERIALES</h4>

                <p>🟢 VERDE = DISPONIBLE</p>
                <p>🟡 AMARILLO = POCO STOCK</p>
                <p>🔴 ROJO = AGOTADO</p>

            </div>

            <!-- ÚLTIMAS ACCIONES -->
            <div class="info-box">

                <h4>ÚLTIMAS ACCIONES</h4>

                <div id="ultimasAcciones">
                    <p>Cargando movimientos...</p>
                </div>

            </div>

        </div>

    </div>

    <!-- JS -->
    <script src="js/script.js"></script>

</body>
</html>
