<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Reportes de Salida</title>
    <link rel="stylesheet" href="css/style.css"> 
</head>
<body>

    <div class="contenedor-principal">
        <h1>📊 CONSULTA DE REPORTES DE SALIDA</h1>

        <div class="buscador">
            <input type="text" id="pqrBuscadorInput" 
                   placeholder="🔎 Ingresa N° PQR o Parte de él..."
                   aria-label="Buscar por número de PQR o parte de él">
            <button id="btnBuscarReporte">BUSCAR REPORTE</button>
        </div>

        <div style="text-align: center; margin-top: 20px; margin-bottom: 20px;">
            <button id="btnCargarTodosLosReportes" class="btn-secondary">Cargar Todos los Reportes</button>
        </div>

        <table class="tabla-inventario">
            <thead>
                <tr>
                    <th>N° PQR / ORDEN</th>
                    <th>Quién se lo lleva</th>
                    <th>Nombre Material</th>
                    <th>Cantidad</th>
                    <th>Unidad</th>
                    <th>Observación</th>
                    <th>Firma</th>
                    <th>Hora</th>
                    <th>Fecha Movimiento</th>
                </tr>
            </thead>
            <tbody id="cuerpoTablaReportes">
                <!-- Los reportes se cargarán aquí -->
            </tbody>
        </table>

        <button onclick="window.location.href='index.html'" class="btn-volver">🔙 VOLVER AL MENÚ PRINCIPAL</button>
    </div>

    <script src="js/reportes.js"></script> <!-- ESTE SCRIPT DEBE EXISTIR Y TENER LA LÓGICA -->
</body>
</html>
